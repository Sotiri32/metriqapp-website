<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Confirming your Metriq account...</title>
  <style>
    body{margin:0;background:#030D1A;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
    .box{text-align:center;color:#F1F5F9;padding:40px 24px;max-width:400px;}
    .logo{width:80px;height:80px;border-radius:16px;margin:0 auto 32px;display:block;}
    .spinner{width:48px;height:48px;border:3px solid rgba(37,99,235,0.2);border-top:3px solid #2563EB;border-radius:50%;animation:spin 0.9s linear infinite;margin:0 auto 28px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    h2{font-size:28px;font-weight:700;margin:0 0 12px;letter-spacing:-0.5px;}
    p{color:#64748B;font-size:17px;margin:0;line-height:1.6;}
  </style>
</head>
<body>
  <div class="box">
    <img class="logo" src="https://qqxijutohmoaofzwzqqo.supabase.co/storage/v1/object/public/assets/LOGO.jpeg" alt="Metriq"/>
    <div class="spinner"></div>
    <h2>Opening Metriq...</h2>
    <p>Redirecting you back to the app.</p>
  </div>
  <script>
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.replace('#','?'));
    const token = params.get('access_token');
    if(token){
      window.location.href = 'metriqmobile://auth/confirmed' + hash;
    } else {
      window.location.href = 'metriqmobile://auth/sign-in';
    }
  </script>
</body>
</html>
